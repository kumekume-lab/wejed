<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="style.css" />
        <script src="script.js" defer></script>
        <meta name="description" content="welcome--js by CambridgeDevClass" />

        <title>Say hi| CambridgeDevClass</title>

        <!-- Icons -->
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
        />

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body>
        <div class="content">
            <div class="header">
                <div class="header__text">Say hi!</div>
                <div class="header__link" onclick="openGithub()">
                    <span class="header__name">Cambridge_Dev_Lab</span>
                    <i class="fa-brands fa-github header__icon"></i>
                </div>
            </div>

            <div class="cards">
                <div class="card" onclick="openPage('pages/001_maria.html')">
                    <img
                        class="card__img"
                        src="https://i.imgur.com/E9spTvP.jpeg"
                        alt="DST image"
                    />
                    <div class="card__text card__text--white">
                        <div class="card__message">Hi there</div>
                        <div class="card__name">Maria</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/002_example.html')">
                    <div class="card__text">
                        <div class="card__message">Hello!</div>
                        <div class="card__name">Alexia Penney</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/003_dina.html')">

                        <div class="card__message">Hello!</div>
                        <div class="card__name">Dina</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/004_luke.html')">
                    <img
                        class="card__img"
                        src="https://media.newyorker.com/photos/59095bb86552fa0be682d9d0/16:9/w_1280,c_limit/Monkey-Selfie.jpg"

                    <div class="card__text">
                        <div class="card__message">Hello!</div>
                        <div class="card__name">Luke</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/005_aaron.html')">
                    <img
                        class="card__img"
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTyYYqt10CcQGcNzCDJwTFB37s6rloLlIBdFw&s"

                    <div class="card__text card__text--white">
                        <div class="card__message">Hi There</div>
                        <div class="card__name">Aaron Weddle</div>
                    </div>
                </div>
                
                <div class="card" onclick="openPage('pages/006_rafael.html')">
                    <img
                        class="card__img"
                        src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR9K0STiW2L56xqIjzzFDB9fsUgvCHLygZjKw&s"
                    />
                    <div class="card__text card__text--white">
                        <div class="card__message">
                            Don't click my card or else.
                        </div>
                        <div class="card__name">Rafael</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/007_ollie.html')">
                    <img
                        class="card__img"
                        src="https://d1nl7v5tzifdth.cloudfront.net/fqtlxbdbppts8awcd5jpokng.webp"
                    />
                    <div class="card__text card__text--white">
                        <div class="card__message">
                            Welcome to my twisted webpage
                        </div>
                        <div class="card__name">Ollie</div>
                    </div>
                </div>

                <div class="card" onclick="openPage('pages/007_matt.html')">
                    <img class="card__img" src ="https://www.desmoinesregister.com/gcdn/presto/2020/01/28/PDEM/88278ac9-2713-4922-83c7-b900399bd281-Success_Kid.jpg?width=1320&height=878&fit=crop&format=pjpg&auto=webp" alt="I did it!">

                        <div class="card__message">I made this.</div>
                        <div class="card__name">Matt</div>
                    </div>
                </div>
                
                <div class="card" onclick="openPage('pages/008_yang.html')">
                    <img class="card__img" src ="https://www.mamp.one/wp-content/uploads/2024/09/image-resources2.jpg" alt="I did it!">
                    <div class="card__text">
                        <div class="card__message">Hi there</div>
                        <div class="card__name">Yang</div>
                    </div>
                </div>
                <div class="card" onclick="openPage('pages/002_example.html')">
                    <div class="card__text">
                        <div class="card__message">Card example</div>
                        <div class="card__name">Your name</div>
                    </div>
                </div>

                <article class="card" onclick="openPage('pages/shramko/index.html')">
                    <img
                        class="card__img"
                        src="https://upload.wikimedia.org/wikipedia/commons/b/bf/Smiley-Dance.gif"
                        alt="dancing smiley"
                    />
                    <div class="card__text card__text--black" style="display: flex; flex-direction: column; justify-content: flex-end; height: 100%">
                        <div class="card__message">Hi</div>
                        <div class="card__name">Serhii</div>
                    </div>
